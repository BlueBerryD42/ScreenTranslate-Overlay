name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore GameTranslateOverlay/GameTranslateOverlay.csproj

      - name: Build
        run: dotnet build GameTranslateOverlay/GameTranslateOverlay.csproj --configuration Debug --no-restore
